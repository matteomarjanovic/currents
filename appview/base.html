<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="referrer" content="origin-when-cross-origin">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.purple.min.css">
  <style>
    code {
      display: inline;
    }

    article {
      max-width: 40em;
    }

    .status-card {
      background: var(--pico-card-background-color);
      border: 1px solid var(--pico-muted-border-color);
      border-radius: var(--pico-border-radius);
      padding: 1rem;
      margin-bottom: 1rem;
    }
  </style>
  <title>Currents appview</title>
</head>

<body>
  <header class="container">
    <hgroup>
      <h1>Currents appview</h1>
      <p>AT Protocol AppView</p>
    </hgroup>
    <nav>
      <ul>
        <li><a href="/feed">Feed</a></li>
        <li><a href="/ops">Ops</a></li>
        {{ if .DID }}
        <li>
          {{if ne .Handle "handle.invalid"}}
          <code>@{{ .Handle }}</code>
          {{else}}
          <code>{{ .DID }}</code>
          {{end}}
        </li>
        <li><a href="/collection">Collections</a></li>
        <li><a href="/save">Saves</a></li>
        <li><a href="/oauth/logout">Logout</a></li>
        {{ else }}
        <li><a href="/oauth/login">Login</a></li>
        {{ end }}
      </ul>
    </nav>
  </header>
  <main class="container">
    <section class="content">
      {{ template "content" . }}
    </section>
  </main>
</body>

</html>
